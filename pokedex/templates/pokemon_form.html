{% extends 'base.html' %}
{% block title %}
  Formulario de Pokemon
{% endblock %}
{% block content %}
  <div class="form-card mx-auto" style="max-width: 720px;">
    <h2 class="mb-4">Registrar Pokémon</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="id_name" class="form-label">Nombre</label>
          {{ form.name }}
        </div>
        <div class="col-md-6">
          <label for="id_type" class="form-label">Tipo</label>
          {{ form.type }}
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="id_height" class="form-label">Altura (m)</label>
          {{ form.height }}
        </div>
        <div class="col-md-6">
          <label for="id_weight" class="form-label">Peso (kg)</label>
          {{ form.weight }}
        </div>
      </div>
      <div class="mb-3">
        <label for="id_trainer" class="form-label">Entrenador</label>
        {{ form.trainer }}
      </div>
      <div class="mb-4">
        <label for="id_picture" class="form-label">Imagen</label>
        {{ form.picture }}
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Guardar Pokémon</button>
        <a href="{% url 'pokedex:index' %}" class="btn btn-outline-secondary">Volver a la lista</a>
      </div>
    </form>
  </div>
{% endblock %}
