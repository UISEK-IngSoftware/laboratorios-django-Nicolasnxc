{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{% endblock title %}</title>
        
        <link href="{% static 'bootstrap.min.css' %}" rel="stylesheet">
        <link href="{% static 'custom.css' %}" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
            <div class="bg-primary text-white p-4 text-center">
                <img src="{% static 'images.jpeg' %}" alt="logo" class="logo">
            </div>
            
            <nav class="navbar navbar-dark bg-danger px-3">
                <ul class="navbar-nav d-flex flex-column mb-0 align-items-start">
                    <li class="nav-item mb-1">
                        <a href="{% url 'pokedex:index' %}" class="nav-link font-weight-bold text-dark p-0">Pokémons</a>
                    </li>
                    
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="POST" class="m-0 p-0">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link text-dark font-weight-bold p-0 border-0 align-baseline" style="background: none; text-decoration: none; font-size: 1rem;">
                                Cerrar Sesión
                            </button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a href="{% url 'pokedex:login' %}" class="nav-link font-weight-bold text-dark p-0">Iniciar Sesión</a>
                    </li>
                    {% endif %}
                </ul>
            </nav>
            
            <div class="mt-4">
                {% block content %}{% endblock content %}
            </div>
        </div>
    </body>
</html>
