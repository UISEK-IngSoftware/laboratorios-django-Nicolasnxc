{% extends "base.html" %}
{% block title %}Registrar Pokémon{% endblock title %}

{% block content %}
<h1>Registrar Nuevo Pokémon</h1>
<div class="row d-flex justify-content-center">
    <div class="col-md-6">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group mb-2">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            
            <div class="form-group mb-2">
                <label for="type">Tipo</label>
                <input type="text" id="type" name="type" class="form-control" required>
            </div>
            
            <div class="form-group mb-2">
                <label for="height">Altura (m)</label>
                <input type="number" step="0.01" id="height" name="height" class="form-control" required>
            </div>
            
            <div class="form-group mb-3">
                <label for="trainer">Entrenador</label>
                <select id="trainer" name="trainer" class="form-control">
                    <option value="">Sin asignar</option>
                    {% for trainer in trainers %}
                        <option value="{{ trainer.id }}">{{ trainer }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group mb-4">
                <label for="picture">Imagen</label>
                <input type="file" id="picture" name="picture" class="form-control-file d-block" accept="image/*" required>
            </div>
            
            <button type="submit" class="btn btn-success">Guardar Pokémon</button>
            <a href="{% url 'pokedex:index' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock content %}
